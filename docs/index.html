<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Screen Capture and Dictation App</title>
  <style>
    :root {
      color-scheme: light dark;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.5;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: Canvas;
      color: CanvasText;
    }

    main {
      width: min(720px, calc(100vw - 48px));
      padding: 48px 0;
    }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(2rem, 6vw, 4rem);
      line-height: 1.05;
      letter-spacing: 0;
    }

    p {
      margin: 0 0 24px;
      max-width: 56ch;
      font-size: 1.125rem;
    }

    a.button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 44px;
      padding: 0 18px;
      border-radius: 8px;
      background: LinkText;
      color: Canvas;
      text-decoration: none;
      font-weight: 600;
    }

    .meta {
      margin-top: 28px;
      font-size: 0.9rem;
      color: color-mix(in srgb, CanvasText 72%, Canvas);
    }

    .meta a {
      color: inherit;
    }
  </style>
</head>
<body>
  <main>
    <h1>Screen Capture and Dictation App</h1>
    <p>
      Native macOS menu-bar screenshot, video recording, and voice dictation utility.
      Releases are signed, notarized, and delivered through Sparkle updates.
    </p>
    <a class="button" href="https://github.com/patrickp2/screen-capture-and-dictation-app/releases/latest">
      Download latest release
    </a>
    <p class="meta">
      Update feed:
      <a href="./appcast.xml">appcast.xml</a>
    </p>
  </main>
</body>
</html>
